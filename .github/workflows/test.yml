name: Test

on:
  pull_request:
    branches:
      - 'master'
    types: [opened, reopened, review_requested, ready_for_review]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    environment: testing
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Prepare runner-temp cache
        run: |
          mkdir -p "$RUNNER_TEMP/npm-cache" "$RUNNER_TEMP/ms-playwright"
          echo "NPM_CONFIG_CACHE=$RUNNER_TEMP/npm-cache" >> $GITHUB_ENV
          echo "PLAYWRIGHT_BROWSERS_PATH=$RUNNER_TEMP/ms-playwright" >> $GITHUB_ENV

      - name: Restore/cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/npm-cache
          key: npm-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-

      - name: Install Dependencies (cache miss)
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Skip install
        if: steps.node-modules-cache.outputs.cache-hit == 'true'
        run: echo "node_modules cache restored — skipping npm ci"

      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Build testing environment
        env:
          PRISMIC_REPOSITORY: ${{ secrets.PRISMIC_REPOSITORY }}
          PRISMIC_ACCESS_TOKEN: ${{ secrets.PRISMIC_ACCESS_TOKEN }}
        run: |
          cp -f .env.testing .env
          npm run build:testing

      - name: Lint
        run: npm run lint

      - name: Run E2E test
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && failure() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Run unit tests
        run: npx vitest
